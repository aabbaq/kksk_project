name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  # Server deploy directory: secret DEPLOY_PATH > variable DEPLOY_PATH > default
  DEPLOY_REMOTE_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH || '/opt/app' }}
  DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE || 'docker/docker-compose.prod.yml' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            context: .
            file: apps/api/Dockerfile
          - service: web
            context: .
            file: apps/web/Dockerfile
          - service: nginx
            context: .
            file: docker/nginx/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # Fork-friendly: build images only until DEPLOY_ENABLED=true and SSH secrets are set.
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          missing=0
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "::error::DEPLOY_HOST secret is required when DEPLOY_ENABLED=true"
            missing=1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error::DEPLOY_SSH_KEY secret is required when DEPLOY_ENABLED=true"
            missing=1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "::error::DEPLOY_USER secret is required when DEPLOY_ENABLED=true"
            missing=1
          fi
          exit $missing

      - name: Show resolved deploy config
        run: |
          echo "DEPLOY_REMOTE_PATH=${{ env.DEPLOY_REMOTE_PATH }}"
          echo "DEPLOY_COMPOSE_FILE=${{ env.DEPLOY_COMPOSE_FILE }}"
          echo "IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}"

      - name: Setup SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT || 22 }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Prepare deploy directory on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "${{ secrets.DEPLOY_PORT || 22 }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'REMOTE'
          set -euo pipefail
          DEPLOY_PATH='${{ env.DEPLOY_REMOTE_PATH }}'
          mkdir -p "$DEPLOY_PATH/docker/scripts"
          echo "SSH user: $(whoami)"
          echo "Home: $HOME"
          echo "Deploy path listing:"
          ls -la "$DEPLOY_PATH"
          ls -la "$DEPLOY_PATH/docker" || true
          touch "$DEPLOY_PATH/.write-test"
          rm "$DEPLOY_PATH/.write-test"
          echo "Write test: OK"
          REMOTE

      - name: Copy deploy files to server (tar over SSH)
        run: |
          tar czf - \
            docker/docker-compose.prod.yml \
            docker/deploy.env.example \
            docker/scripts/deploy-remote.sh \
            docker/scripts/reload-nginx.sh \
          | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "${{ secrets.DEPLOY_PORT || 22 }}" \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              "tar xzf - -C '${{ env.DEPLOY_REMOTE_PATH }}'"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "${{ secrets.DEPLOY_PORT || 22 }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "ls -la '${{ env.DEPLOY_REMOTE_PATH }}/docker/'"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_REMOTE_PATH }}
          COMPOSE_FILE: ${{ env.DEPLOY_COMPOSE_FILE }}
          IMAGE_REGISTRY: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          envs: DEPLOY_PATH,COMPOSE_FILE,IMAGE_REGISTRY,IMAGE_TAG,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            bash docker/scripts/deploy-remote.sh

  deploy-skipped-notice:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && vars.DEPLOY_ENABLED != 'true'
    steps:
      - name: Deploy skipped
        run: |
          echo "::notice::Deploy stage skipped. Images were pushed to GHCR."
          echo "::notice::To enable SSH deploy: configure secrets (see docs/DEPLOY.md) and set repository variable DEPLOY_ENABLED=true."
