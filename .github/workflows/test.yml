name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-integration:
    if: vars.TESTS_ENABLED != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend tests
        run: pnpm test

  tests-skipped-notice:
    if: vars.TESTS_ENABLED == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Tests skipped
        run: |
          echo "::notice::Unit/integration tests skipped (TESTS_ENABLED=false)."
          echo "::notice::Set repository variable TESTS_ENABLED=true (or remove it) to run tests in CI."
