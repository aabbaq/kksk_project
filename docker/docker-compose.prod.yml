# Production stack for Alibaba Cloud ECS (2 vCPU / 2 GiB)
# Usage on server:
#   cp docker/deploy.env.example .env
#   # edit .env with real secrets
#   docker compose -f docker/docker-compose.prod.yml pull
#   docker compose -f docker/docker-compose.prod.yml up -d

name: ${COMPOSE_PROJECT_NAME:-app}

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    command: mongod --wiredTigerCacheSizeGB 0.25
    environment:
      MONGO_INITDB_DATABASE: blog
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  api:
    image: ${IMAGE_REGISTRY:?Set IMAGE_REGISTRY in .env}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/blog
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3h}
      UPLOAD_DIR: uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      STORAGE_USE_OBJECT_STORE: ${STORAGE_USE_OBJECT_STORE:-false}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_KEY_PREFIX: ${S3_KEY_PREFIX:-uploads/}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    volumes:
      - uploads_data:/app/apps/api/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  web:
    image: ${IMAGE_REGISTRY:?Set IMAGE_REGISTRY in .env}/web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1/']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

  nginx:
    image: ${IMAGE_REGISTRY:?Set IMAGE_REGISTRY in .env}/nginx:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 48M
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1/']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

networks:
  internal:
    driver: bridge

volumes:
  mongo_data:
  uploads_data:
